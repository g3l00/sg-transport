spring.application.name=sg-transport-backend

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:sg_transport}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# LTA API
lta.api.url=https://datamall2.mytransport.sg/ltaodataservice
lta.api.key=${LTA_API_KEY:}
lta.mock.enabled=${LTA_MOCK_ENABLED:false}

# Caching
spring.cache.type=simple
