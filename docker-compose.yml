services:
  postgres:
    image: postgres:15
    container_name: sg-transport-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sg_transport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sg-transport-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sg_transport
      DB_USER: postgres
      DB_PASSWORD: postgres
      LTA_API_KEY: ${LTA_API_KEY}

  frontend:
    build: ./frontend
    container_name: sg-transport-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
